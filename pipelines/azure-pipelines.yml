trigger: 
  - none

pr:
  branches:
    include:
      - main
variables:
  - group: terraform-vars
  - name: workingDir
    value: 'environments/dev'
stages:
  - stage: Plan
    displayName: 'Terraform Plan (CI)'
    pool: self-hosted
    jobs:
      - job: Plan
        steps:
          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: 'latest'
          - powershell: |
              terraform fmt -check
            displayName: 'Check format'
            workingDirectory: '$(System.DefaultWorkingDirectory)'
          - template: templates/terraform-task.yml
            parameters:
              serviceConnection: $(SERVICE_CONNECTION)
              displayName: 'Terraform Init'
              command: 'terraform -chdir=$(workingDir) init'
          - powershell: |
              terraform validate
            displayName: 'code validate'
            workingDirectory: '$(System.DefaultWorkingDirectory)/$(workingDir)'
          - template: templates/terraform-task.yml
            parameters:
              serviceConnection: $(SERVICE_CONNECTION)
              displayName: 'Terraform Plan'
              command: 'terraform -chdir=$(workingDir) plan -out=plan.tfplan'  
          - task: PublishPipelineArtifact@1
            displayName: 'Publish Plan'
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/$(workingDir)/plan.tfplan'
              artifact: 'tfplan'

  - stage: Apply
    displayName: 'Terraform Apply (CD)'
    dependsOn: Plan
    pool: self-hosted
    jobs:
      - deployment: Apply
        environment: $(ENVIRONMENT)
        strategy:
          runOnce:
            deploy:
              steps:
              - template: templates/terraform-task.yml
                parameters:
                  serviceConnection: $(SERVICE_CONNECTION)
                  displayName: 'Terraform Init'
                  command: 'terraform -chdir=$(workingDir) init'
              - template: templates/terraform-task.yml
                parameters:
                  serviceConnection: $(SERVICE_CONNECTION)
                  displayName: 'Terraform Apply'
                  command: 'terraform -chdir=$(workingDir) apply --auto-approve'
                      

